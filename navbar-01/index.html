<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Simple Clean Business Navbar</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="site-header">
    <nav class="navbar" aria-label="Primary navigation">
      <a class="brand" href="#">Northstar</a>
      <button class="nav-toggle" type="button" aria-label="Open navigation menu" aria-expanded="false" aria-controls="primary-menu">
        <span></span><span></span><span></span>
      </button>
      <div class="nav-menu" id="primary-menu">
        <a href="#">Services</a>
        <a href="#">Work</a>
        <a href="#">About</a>
        <a href="#">Insights</a>
        <a class="nav-cta" href="#">Book a call</a>
      </div>
    </nav>
  </header>
  <main>
    <section class="hero">
      <div>
        <p class="eyebrow">Business ready</p>
        <h1>Clean navigation for modern professional websites.</h1>
        <p>Use this pattern for agencies, consultants, and service companies that need a calm, reliable first impression.</p>
      </div>
    </section>
  </main>
  <script src="script.js"></script>
</body>
</html>
