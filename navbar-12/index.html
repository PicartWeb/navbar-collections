<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SaaS Navbar with Login and CTA</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="site-header">
    <nav class="navbar" aria-label="Primary navigation">
      <a class="brand" href="#">
        <svg viewBox="0 0 32 32" aria-hidden="true"><path d="M16 3 29 10v12l-13 7-13-7V10l13-7Z" fill="currentColor"/></svg>
        Flowdesk
      </a>
      <button class="nav-toggle" type="button" aria-label="Open navigation menu" aria-expanded="false" aria-controls="primary-menu">
        <span></span><span></span><span></span>
      </button>
      <div class="nav-menu" id="primary-menu">
        <a href="#">Product</a>
        <a href="#">Integrations</a>
        <a href="#">Security</a>
        <a href="#">Pricing</a>
      </div>
      <div class="account-actions">
        <a class="login" href="#">Log in</a>
        <a class="cta" href="#">Start trial</a>
      </div>
    </nav>
  </header>
  <main>
    <section class="hero">
      <p>SaaS conversion</p>
      <h1>A focused SaaS navbar with login and a primary CTA.</h1>
      <p>Use it for application landing pages, dashboards, and product-led signup flows.</p>
    </section>
  </main>
  <script src="script.js"></script>
</body>
</html>
