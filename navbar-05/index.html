<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Animated Underline Navbar</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="site-header">
    <nav class="navbar" aria-label="Primary navigation">
      <a class="brand" href="#">Markline</a>
      <button class="nav-toggle" type="button" aria-label="Open navigation menu" aria-expanded="false" aria-controls="primary-menu">
        <span></span><span></span><span></span>
      </button>
      <div class="nav-menu" id="primary-menu">
        <a href="#">Home</a>
        <a href="#">Portfolio</a>
        <a href="#">Process</a>
        <a href="#">Studio</a>
        <a href="#">Contact</a>
      </div>
    </nav>
  </header>
  <main>
    <section class="hero">
      <p>Motion detail</p>
      <h1>Elegant link underlines that animate on hover and focus.</h1>
      <p>This navbar keeps the layout simple while adding a subtle sense of polish to every navigation item.</p>
    </section>
  </main>
  <script src="script.js"></script>
</body>
</html>
