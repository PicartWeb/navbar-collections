<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Transparent Navbar Over Hero</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="hero-header">
    <nav class="navbar" aria-label="Primary navigation">
      <a class="brand" href="#">Altitude</a>
      <button class="nav-toggle" type="button" aria-label="Open navigation menu" aria-expanded="false" aria-controls="primary-menu">
        <span></span><span></span><span></span>
      </button>
      <div class="nav-menu" id="primary-menu">
        <a href="#">Trips</a>
        <a href="#">Guides</a>
        <a href="#">Journal</a>
        <a href="#">Contact</a>
      </div>
    </nav>
    <section class="hero">
      <p>Adventure studio</p>
      <h1>Transparent navigation for immersive hero sections.</h1>
      <a class="hero-button" href="#">Explore routes</a>
    </section>
  </header>
  <script src="script.js"></script>
</body>
</html>
